[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on = "e"
for = "unix"
run = 'shell "nvim" --block'
desc = "Open neovim in this folder"

[[mgr.prepend_keymap]]
on = "g"
for = "unix"
run = 'shell "lazygit" --block'
desc = "Open lazygit in this folder"
